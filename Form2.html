<body>
    <h1>Student Registration Form</h1>
    <form>
        <label for="rollno">Roll No.</label>
        <br/>
        <input type="number" name="number" id="rollno" placeholder="Enter your rollno">
        <br/>
        <br/>

        <input type="text" name="text" id="studentname"placeholder="First name">
        <input type="text" name="text" id="studentname"placeholder="Last name">
        <br/>
        <br/>

        <br/>

        <br/>

        <br/>

        <br/>

        <input type="email" name="mail" id="mailid">
        <br/>
        <br/>

        <label for="male">Male</label>
        <input type="radio" name="radio" id="female">
        <label for="female">Female</label>
        <br/>
        <br/>

        <input type="radio" name="radio" id="ece">
        <label for="ece">ECE</label>
         <input type="radio" name="radio" id="civel">
        <label for="civel">CIVIL</label>

        <label for="mech">Mech</label>
        
        <br/>
        <br/>
        <label for="course">Course:</label>
    <select name="course" id="course">
        <option value="B.tech">Select current course</option>
        <option value="B.tech">Select current course</option>
        <option value="B.tech">Select current course</option>
        <option value="B.tech">Select current course</option>
    </select>
    <br/>
    <br/>

    <br/>
    <br/>
    <label for="city">City:</label>
    <input type="text" name="text" id="city">
    <br/>
    <br/>
    <label for="address">Address:</label>
    <input type="text" name="" id="">
    <br/>
    <br/>
    <button type="submit">Register</button>

    <button>Trial</button>
