<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Course Application</h1>
    <form>
      <input type="text" name="text" id="" placeholder="Full Name" />
      <br />
      <br />
      <input type="email" name="email" id="" placeholder="Email" />
      <input type="text" name="text" id="" placeholder="Phone" />
      <br />
      <br />
      <label for="course">Which course are you applying for?</label>
      <br />
      <input type="radio" name="radio" id="coursea" />
      <label for="coursea">Course A</label>
      <br />
      <input type="radio" name="radio" id="courseb" />
      <label for="courseb">Course B</label>
      <br />
      <input type="radio" name="radio" id="coursec" />
      <label for="coursec">Course C</label>
      <br />
      <br />
      <label for="dob">Date Of Birth:</label>
      <br />
      <input type="date" name="date" id="dob" placeholder="dd-mm-yy" />
      <label for="male">Male</label>
      <input type="radio" name="radio" id="male" />
      <label for="female">Female</label>
      <input type="radio" name="radio" id="female" />
      <br />
      <br />
      <label for="education">Education:</label>
      <br />
      <select name="education" id="education">
        <option value="10th">Select Education</option>
        <option value="12th">Select Education</option>
        <option value="Diploma">Select Education</option>
        <option value="Graduation">Select Education</option>
        <option value="Post Graduation">Select Education</option>
      </select>
      <br />
      <br />
      <input type="text" name="text" id="" placeholder="Address" />
      <br />
      <br />
      <input type="text" name="text" id="" placeholder="City" />
      <input type="text" name="text" id="" placeholder="State" />
      <br />
      <br />
      <input type="text" name="text" id="" placeholder="Zip Code" />
      <input type="text" name="text" id="" placeholder="Country" />
      <br />
      <br />
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
