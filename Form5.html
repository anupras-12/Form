<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form>
        <label for="firstname">First Name:</label>
        <input type="text" name="text" id="firstname" placeholder="First Name">
        <br/>
        <br/>
        <label for="lastname">Last Name:</label>
        <input type="text" name="text" id="lastname" placeholder="Last Name">
        <br/>
        <br/>
        <label for="department">Department & Office:</label>
        <select type="department">
            <option type="IT">Select Your Department/Office</option>
            <option type="Sales">Select Your Department/Office</option>
            <option type="Tester">Select Your Department/Office</option>
            <option type="Developer">Select Your Department/Office</option>
            <option type="Operations">Select Your Department/Office</option>
            <option type="Finance">Select Your Department/Office</option>
        </select>
        <br/>
        <br/>
        <label for="username">Username:</label>
        <input type="text" name="text" id="username" placeholder="Username">
        <br/>
        <br/>
        <label for="password">Password:</label>
        <input type="text" name="text" id="password" placeholder="Password">
        <br/>
        <br/>
        <label for="confirmpassword">Confirm Password:</label>
        <input type="text" name="text" id="confirmpassword" placeholder="Confirm Password">
        <br/>
        <br/>
        <label for="email">E-mail:</label>
        <input type="text" name="text" id="eamil"placeholder="E-mail Address">
        <br/>
        <br/>
        <label for="contactno">Contact No.</label>
        <input type="text" name="text" id="contactno"placeholder="123">
        <br/>
        <br/>
        <button type="submit">SUBMIT</button>
    </form>
</body>
</html>
