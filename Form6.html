<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <form>
    <label for="username">Username:</label>
    <input type="text" name="text" id="username">
    <br/>
    <br/>
    <label for="password">Password:</label>
    <input type="password" name="password" id="password">
    <br/>
    <br/>
    <label for="cityofemployment">City Of Employment:</label>
    <input type="text" name="text" id="cityofemployment">
    <br/>
    <br/>
    <label for="webserver">Web Server:</label>
    <select>
        <option type="">--Choose a server--</option>
    </select>
    <br/>
    <br/>
    <label for="specify">Please specify your role:</label>
    <input type="radio" name="radio" id="admin">
    <label for="admin">Admin</label>
    
    <input type="radio" name="radio" id="engineer">
    <label for="engineer">Engineer</label>
    <input type="radio" name="radio" id="manager">
    <label for="manager">Manager</label>
    <input type="radio" name="radio" id="guest">
    <label for="guest">Guest</label>
    <br/>
    <br/>
    <label for="single">Single Sign-on to the following:</label>
    <input type="checkbox" name="checkbox" id="mail">
    <label for="mail">Mail</label>
    <input type="checkbox" name="checkbox" id="payroll">
    <label for="payroll">Payroll</label>
    <input type="checkbox" name="checkbox" id="selfservice">
    <label for="selfservice">Self-srvice</label>
    <br/>
    <br/>
    <button type="submit">Login</button>
    <button type="reset">Reset</button>
   </form>
</body>
</html>
