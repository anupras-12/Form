<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <form>
        <label for="firstname">First Name:</label>
        <input type="text" name="text" id="firstname">
        <br/>
        <br/>
        <label for="lastname">Last Name:</label>
        <input type="text" name="text" id="lastname">
        <br/>
        <br/>
        <label for="email">Email:</label>
        <input type="text" name="text" id="email">
        <br/>
        <br/>
        <label for="mobile">Mobile Number:</label>
        <select>
            <option>+91</option>
            <option>+1</option>
            <option>+811</option>

        </select>
        <input type="text" name="text" id="mobile">
        <br/>
        <br/>
        <label for="course">Course:</label>
        <input type="radio" name="radio" id="bba">
        <label for="bba">B.B.A</label>
        <input type="radio" name="radio" id="Bcom">
        <label for="bcom">B.Com</label>
        <input type="radio" name="radio" id="bcomh">
        <label for="bcomh">B.Com(H)</label>
        <input type="radio" name="radio" id="bsc">
        <label for="bsc">B.Sc</label>
        <br/>
        <br/>
        <label for="gender">Gender:</label>
        <input type="radio" name="radio" id="male">
        <label for="male">Male</label>
        <input type="radio" name="radio" id="female">
        <label for="female">Female</label>
        <input type="radio" name="radio" id="other">
        <label for="other">Other</label>
        <br/>
        <br/>
        <button type="submit">Submit</button>



    </form>
</body>
</html>
